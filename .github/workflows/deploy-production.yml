name: Deploy to Production

on:
  workflow_dispatch:  # Manual trigger only
  workflow_run:
    workflows: ["Backend Tests", "Frontend Tests & Build", "Build & Push Backend Docker Image", "Build & Push Frontend Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Summary
        run: |
          echo "✅ All CI/CD checks passed!"
          echo "📦 Deploying to production..."
          echo ""
          echo "**Deployment Information:**"
          echo "- Repository: ${{ github.repository }}"
          echo "- Branch: ${{ github.ref }}"
          echo "- Commit: ${{ github.sha }}"
          echo "- Author: ${{ github.actor }}"
          echo ""
          echo "**Docker Images Available:**"
          echo "- ghcr.io/${{ github.repository_owner }}/tradeflow-api:latest"
          echo "- ghcr.io/${{ github.repository_owner }}/tradeflow-web:latest"
          echo ""
          echo "**Starting EC2 Deployment...**"

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          echo "🚀 Starting deployment on EC2..."

          $SSH_CMD << 'EOF'
          echo "📍 Starting deployment script on EC2..."

          # Navigate to project directory
          cd /opt/tradeflow-os
          echo "📂 Changed to: $(pwd)"

          # Pull latest code from GitHub
          echo "📥 Pulling latest code from GitHub..."
          git pull origin main

          # Pull latest Docker images
          echo "🐳 Pulling latest Docker images..."
          docker compose pull

          # Stop old containers and start new ones
          echo "♻️  Restarting services with new images..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          # Wait for services to be ready
          echo "⏳ Waiting for services to start..."
          sleep 10

          # Run database migrations
          echo "🗄️  Running database migrations..."
          docker compose exec -T api alembic upgrade head

          # Show running containers
          echo ""
          echo "✅ Deployment complete! Running services:"
          docker compose ps

          # Health check
          echo ""
          echo "🏥 Verifying health endpoints..."
          curl -s http://localhost:8000/healthz
          echo ""
          echo "✅ API is responding!"
          EOF

      - name: Deployment Success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "✅ Code pushed to GitHub"
          echo "✅ Tests passed"
          echo "✅ Docker images built"
          echo "✅ EC2 updated with latest code and images"
          echo ""
          echo "🌐 Live at: http://${{ secrets.VPS_HOST }}"
          echo "📱 Frontend: http://${{ secrets.VPS_HOST }}:3000"
          echo "📚 API Docs: http://${{ secrets.VPS_HOST }}:8000/docs"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details"
          echo ""
          echo "Common issues:"
          echo "1. SSH key not configured (check GitHub Secrets)"
          echo "2. EC2 not running or unreachable"
          echo "3. Docker command failed on EC2"
          echo ""
          echo "To fix:"
          echo "1. Verify VPS_HOST, VPS_USER, VPS_SSH_KEY in GitHub Secrets"
          echo "2. SSH manually to debug: ssh -i key.pem ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          echo "3. Check /opt/tradeflow-os/docker-compose.log for errors"
